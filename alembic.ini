# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = db/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path for migration scripts
prepend_sys_path = .

# Database URL — overridden from env in env.py
sqlalchemy.url = postgresql://user:password@localhost:5432/qa_automation

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
