<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered QA Automation Dashboard — Playwright test generation, execution, and analysis">
    <title>{% block title %}QA Automation{% endblock %} | QA Agent</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        },
                        surface: {
                            50:  '#ffffff',
                            100: '#f8fafc',
                            200: '#e5e7eb',
                            700: '#64748b',
                            800: '#ffffff',
                            900: '#f3f6fb',
                        }
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="h-full bg-surface-900 text-slate-900 font-['Inter']">
    <div class="flex h-full app-shell">
        <!-- Sidebar -->
        <aside class="w-64 bg-surface-800 border-r border-slate-200 flex flex-col fixed h-full z-30 shadow-sm">
            <!-- Logo -->
            <div class="px-6 py-5 border-b border-slate-200">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-brand-600 flex items-center justify-center shadow-sm">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-bold text-slate-950 tracking-tight">QA Agent</h1>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">AI Automation</p>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="{% if request.path == '/run' %}javascript:void(0){% else %}/run{% endif %}" class="nav-link {% if request.path == '/run' %}active{% endif %}">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>Run Test</span>
                </a>

                <a href="/test-cases" class="nav-link {% if request.path == '/test-cases' %}active{% endif %}">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z" />
                    </svg>
                    <span>Test Cases</span>
                </a>

                <a href="/runs" class="nav-link {% if request.path == '/runs' %}active{% endif %}">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span>Run History</span>
                </a>

            </nav>

            <!-- Footer -->
            <div class="px-4 py-3 border-t border-slate-200 text-[11px] text-slate-500">
                Powered by Gemini AI + Playwright
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 ml-64 overflow-y-auto">
            <div class="p-6 lg:p-8 max-w-7xl">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Global Test Case Details Modal -->
    <div id="test-case-details-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[120] flex items-center justify-center p-4">
        <div class="bg-surface-800 border border-white/10 rounded-3xl w-full max-w-2xl p-0 shadow-2xl scale-in overflow-hidden">
            <div class="px-8 py-6 border-b border-white/5 bg-white/[0.02] flex items-center justify-between">
                <div>
                    <h3 id="tc-details-title" class="text-xl font-bold text-white mb-1">Test Case Details</h3>
                    <div id="tc-details-category" class="text-[10px] uppercase tracking-widest text-brand-400 font-bold"></div>
                </div>
                <button onclick="closeTestCaseDetailsModal()" class="text-gray-500 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="px-8 py-6 max-h-[500px] overflow-y-auto custom-scrollbar space-y-6">
                <div>
                    <label class="text-[10px] uppercase tracking-wider font-bold text-gray-500 block mb-2">Situation Description</label>
                    <div id="tc-details-desc" class="text-sm text-gray-300 bg-surface-900/50 p-4 rounded-xl border border-white/5 leading-relaxed"></div>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-wider font-bold text-gray-500 block mb-2">Test Steps</label>
                    <div id="tc-details-steps" class="space-y-2">
                        <!-- Steps will be injected here -->
                    </div>
                </div>
            </div>
            <div class="px-8 py-6 border-t border-white/5 bg-white/[0.02] flex justify-between items-center">
                <span class="text-xs text-gray-500">Created at: <span id="tc-details-date">—</span></span>
                <div class="flex gap-3">
                    <button onclick="closeTestCaseDetailsModal()" class="px-6 py-2.5 text-sm font-semibold text-gray-500 hover:text-white transition-colors">Close</button>
                    <button id="tc-details-run-btn" class="bg-brand-600 hover:bg-brand-500 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all active:scale-95 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        </svg>
                        Run Test
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
